name: scrape
on:
  schedule:
    # First Monday of every month, 06:30 IST = 01:00 UTC
    - cron: "0 1 1-7 * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run scrape
      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore(data): monthly IFSC snapshot"
            git push
          fi
